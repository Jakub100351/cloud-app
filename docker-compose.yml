services:
  # Kontener bazy danych
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: TaskDb
    ports:
      - "5432:5432"
    volumes: # <--- DODANO: Podpięcie dysku do bazy
      - pgdata:/var/lib/postgresql/data

  # Kontener backendu
  backend:
    build:
      context: ./backend
    ports:
      - "8081:8080"
    depends_on:
      - db
    restart: always  # <--- TA LINIJKA ROBI MAGIĘ

# <--- DODANO: Rejestracja dysku w systemie Dockera
volumes:
  pgdata: